<!DOCTYPE html>
<html>
    <head>
        <title>JavaScript DOM - To-Do App</title>
        <style>
            body{
                font=family:Arial;
                width:350px;
                margin:30px auto;
            }
            input{
                width:220px;
                padding:8px;
            }
            button{
                padding:8px 12px;
            }
            button{
                padding:8px 12px;
            }
            li{
                margin:10px 0;
            }
        </style>
    </head>
    <body>
        <h2 id="heading">My To-Do Application</h2>
        <input type="text" id="task" placeholder="Enter task">
        <button id="addBtn">Add Task</button>
        <ul id="taskList"></ul>
        <script>
            //DOM
            const heading = document.getElementById("heading");
            const taskInput = document.getElementById("task");
            const addButton = document.getElementById("addBtn");
            const taskList = document.getElementById("addBtn");
            //Event Listener
            addButton.addEventListner("click", addTask);
            //change heading when mouse is over it(Event)
            heading.addEventListener("mouseover", function()
        {
            heading.innerHtml = "JavaScript DOM Mainpulation";
        });
        //load tasks from local storage
        window.onload = function(){
            let tasks =JSON.parse(localStorage.getItem("tasks")) || [];
            tasks.forEach(function(task){
                createTask(task);
            });
        };
        //function
        function addTask(){
            //Form validation
            if(taskInput.value.trim() == ""){
                alert("please enter a task.");
                return;
            }
            createTask(taskInput.value);
            let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
            tasks.push(taskInput.value);
            localStorage.setItem("tasks", JSON.stringify(tasks));
            taskInput.value = "";
        }
        //create Task
        function createTask(task){
            let li = document.createElement("li");
            li.innerHTML = task +"";
            let removeBtn = document.createElement("buttton");
            removeBtn.innerHTML ="Delete";
            removeBtn.addEventListener("click", function()){
                li.remove();
                let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
                tasks = tasks.filter(function(item)){
                    return item !== task;                    
                };
                localStorage.setItem("tasks" , JSON.stringify(tasks));
            };
            li.appendChild(removeBtn);
            taskList.appendChild(li);
        }
        </script>
    </body>
</html>
