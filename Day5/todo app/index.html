<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovative To-Do App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <h1><i class="fa-solid fa-list-check"></i> My To-Do List</h1>

    <p class="subtitle">Stay Organized Every Day</p>

    <div class="input-box">

        <input
        type="text"
        id="taskInput"
        placeholder="Enter your task...">

        <button id="addBtn">
            <i class="fa-solid fa-plus"></i>
            Add
        </button>

    </div>

    <div class="search-box">

        <input
        type="text"
        id="searchInput"
        placeholder="Search Task...">

    </div>

    <ul id="taskList">

    </ul>

    <div class="progress-section">

        <h3>Task Progress</h3>

        <div class="progress-bar">

            <div id="progress"></div>

        </div>

        <div class="counts">

            <span>Total :
                <strong id="totalTasks">0</strong>
            </span>

            <span>Completed :
                <strong id="completedTasks">0</strong>
            </span>

            <span>Pending :
                <strong id="pendingTasks">0</strong>
            </span>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
